name: Build Godot Windows Export Templates

on:
  watch:
    types: [started]

jobs:
  build-windows-template:
    runs-on: windows-2022

    env:
      GODOT_TAG: 4.6.2-stable
      GODOT_ARCH: x86_64
      SCRIPT_AES256_ENCRYPTION_KEY: ${{ secrets.GODOT_AES_KEY }}

    steps:
      - name: Checkout Godot source
        shell: pwsh
        run: |
          git clone https://github.com/godotengine/godot.git -b $env:GODOT_TAG godot

      - name: Install Python dependencies
        shell: pwsh
        run: |
          cd godot
          python -m pip install --upgrade pip
          python -m pip install scons

      - name: Build release template
        shell: pwsh
        run: |
          cd godot
          scons platform=windows target=template_release arch=$env:GODOT_ARCH production=yes d3d12=no

      - name: Build debug template
        shell: pwsh
        run: |
          cd godot
          scons platform=windows target=template_debug arch=$env:GODOT_ARCH d3d12=no

      - name: Upload templates
        uses: actions/upload-artifact@v4
        with:
          name: godot-windows-templates-${{ env.GODOT_TAG }}
          path: |
            godot/bin/godot.windows.template_release.x86_64.exe
            godot/bin/godot.windows.template_debug.x86_64.exe
